{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Application moderne et intuitive pour la gestion de vos projets et tâches sous forme Kanban.">
    <meta name="keywords" content="gestion, tâches, projets, productivité, kanban, équipe">
    <meta name="author" content="Gestion Tâches App">
    <meta property="og:title" content="Gestion des Tâches - Kanban">
    <meta property="og:description" content="Gérez vos projets et tâches efficacement avec notre outil intuitif.">
    <meta property="og:type" content="website">
    <title>{% block title %}Gestion des Tâches{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="header-links">
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Profil</a>
            <a href="{% url 'logout' %}" class="logout-link" onclick="return confirm('Êtes-vous sûr de vouloir vous déconnecter ?')">Déconnexion</a>
        {% else %}
            <a href="{% url 'login' %}">Connexion</a>
            <a href="{% url 'register' %}">Inscription</a>
        {% endif %}
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
