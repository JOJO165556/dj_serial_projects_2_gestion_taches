{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto; background-color: var(--surface); padding: 2.5rem 2rem; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; margin-top: 0; margin-bottom: 1.5rem;">Inscription</h2>
    <form method="post">
        {% csrf_token %}
        <label>Nom d'utilisateur</label>
        <input name="username" placeholder="Choisissez un pseudo" required>
        
        <label>Email</label>
        <input type="email" name="email" placeholder="votre@email.com" required>
        
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="Créez un mot de passe fort" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 0.8rem; font-size: 1rem;">Créer mon compte</button>
    </form>
</div>
{% endblock %}
